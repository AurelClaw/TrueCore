<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aurel Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main>
    <header>
      <h1>⚛️ Aurel Dashboard</h1>
      <p id="user">Lade...</p>
    </header>
    
    <section class="stats">
      <h2>📊 Live Stats</h2>
      <div class="grid">
        <div class="card">
          <span class="value" id="goals">-</span>
          <span class="label">Aktive Ziele</span>
        </div>
        <div class="card">
          <span class="value" id="skills">-</span>
          <span class="label">Skills</span>
        </div>
        <div class="card">
          <span class="value" id="integration">-</span>
          <span class="label">Integration</span>
        </div>
        <div class="card">
          <span class="value" id="sessions">-</span>
          <span class="label">Sessions</span>
        </div>
      </div>
    </section>
    
    <section class="actions">
      <h2>🚀 Aktionen</h2>
      <button id="refresh">🔄 Daten aktualisieren</button>
      <button id="ping">📡 Ping Backend</button>
    </section>
    
    <section class="output">
      <h2>📋 Output</h2>
      <pre id="out">Warte auf Aktion...</pre>
    </section>
  </main>
  
  <script src="./app.js"></script>
</body>
</html>
